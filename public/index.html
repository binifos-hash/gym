<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPlanner</title>
  <meta name="apple-mobile-web-app-title" content="GymPlanner">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="main-header">
    <h1>GymPlanner</h1>
  </header>

  <main class="screen-wrap">
    <section id="tab-edit" class="tab-panel">
      <div class="panel-card">
        <div class="editor-top">
          <div class="editor-day-row">
            <select id="editorDaySelect"></select>
            <select id="editorDayTypeSelect">
              <option value="">-- Tipo --</option>
              <option value="Spinta">Spinta</option>
              <option value="Trazione">Trazione</option>
              <option value="Gambe">Gambe</option>
              <option value="Core">Core</option>
              <option value="Cardio">Cardio</option>
              <option value="Mobilita">Mobilita</option>
              <option value="Full Body">Full Body</option>
            </select>
          </div>
          <button id="saveWeekBtn" class="btn-save">Salva settimana</button>
        </div>
        <ul id="dayExerciseList" class="day-ex-list"></ul>
        <button id="openPickerBtn" class="btn-add-exercise" type="button">+ Aggiungi esercizio</button>
      </div>
      <button id="openLibraryMgrBtn" class="btn-library-mgr" type="button">Gestisci libreria esercizi</button>
    </section>

    <section id="tab-week" class="tab-panel active">
      <div id="weekOverview" class="week-overview">
        <div class="week-toolbar">
          <button id="openCalendarBtn" class="calendar-btn" type="button" aria-label="Apri calendario allenamenti">
            <span class="calendar-btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M7 2.5a1 1 0 0 1 1 1V5h8V3.5a1 1 0 1 1 2 0V5h.5A2.5 2.5 0 0 1 21 7.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 18.5v-11A2.5 2.5 0 0 1 5.5 5H6V3.5a1 1 0 0 1 1-1Zm11.5 7h-13a.5.5 0 0 0-.5.5v8.5c0 .28.22.5.5.5h13a.5.5 0 0 0 .5-.5V10a.5.5 0 0 0-.5-.5ZM8 12h3v3H8v-3Zm5 0h3v3h-3v-3Z" fill="currentColor"/>
              </svg>
            </span>
            <span>Calendario</span>
          </button>
        </div>
        <div class="week" id="weekContainer"></div>
      </div>

      <section id="workoutDetail" class="workout-detail hidden">
        <button id="backToWeekBtn" class="back-btn" type="button">← Torna alla settimana</button>
        <div class="workout-detail-head">
          <div>
            <p id="workoutDetailKicker" class="workout-kicker"></p>
            <h2 id="workoutDetailTitle">Allenamento</h2>
            <p id="workoutDetailMeta" class="workout-detail-meta"></p>
          </div>
          <div class="workout-summary-block">
            <div id="workoutTimer" class="workout-timer hidden">00:00:00</div>
            <div id="workoutCompletedSummary" class="workout-completed-summary hidden"></div>
          </div>
        </div>

        <div id="workoutActions" class="workout-actions"></div>
        <div id="workoutExerciseList" class="workout-exercise-list"></div>
      </section>

      <div id="calendarModal" class="calendar-modal hidden">
        <div class="calendar-backdrop"></div>
        <div class="calendar-panel panel-card">
          <div class="calendar-head">
            <button id="calendarPrevBtn" class="calendar-nav" type="button">‹</button>
            <h2 id="calendarMonthLabel">Calendario</h2>
            <div class="calendar-head-actions">
              <button id="calendarNextBtn" class="calendar-nav" type="button">›</button>
              <button id="closeCalendarBtn" class="calendar-close" type="button">✕</button>
            </div>
          </div>
          <div class="calendar-legend">
            <span><i class="legend-dot legend-done"></i>Fatto</span>
            <span><i class="legend-dot legend-planned"></i>Programmato</span>
            <span><i class="legend-dot legend-missed"></i>Perso</span>
          </div>
          <div class="calendar-weekdays">
            <span>Lun</span>
            <span>Mar</span>
            <span>Mer</span>
            <span>Gio</span>
            <span>Ven</span>
            <span>Sab</span>
            <span>Dom</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </div>
    </section>

    <section id="tab-personal" class="tab-panel">
      <div class="panel-card">
        <h2>Sezione Personale</h2>
        <div class="profile-head">
          <p class="profile-name" id="profileName">Paolo Bini</p>
          <div class="profile-streak" id="profileStreak" aria-label="Streak personale">
            <span id="profileStreakValue">0</span>
            <span class="profile-streak-fire" aria-hidden="true">🔥</span>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="chart-head">
          <h2>Peso e Massa Muscolare</h2>
          <button id="addMetricBtn" class="round-add">+</button>
        </div>

        <form id="metricForm" class="metric-form hidden">
          <input id="metricDate" type="date" required>
          <input id="metricWeight" type="number" step="0.1" min="0" placeholder="Peso (kg)" required>
          <input id="metricMuscle" type="number" step="0.1" min="0" placeholder="Massa muscolare (kg)" required>
          <button class="btn-save" type="submit">Aggiungi dato</button>
        </form>

        <div class="metrics-chart-shell">
          <canvas id="metricsYAxis" width="56" height="300"></canvas>
          <div id="metricsChartScroll" class="metrics-chart-scroll">
            <canvas id="metricsChart" width="860" height="300"></canvas>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <h2>Diario Allenamenti</h2>
        <form id="diaryForm" class="diary-form">
          <textarea id="diaryInput" rows="4" placeholder="Come sta andando? Sensazioni, carichi, recupero..."></textarea>
          <button type="submit" class="btn-save">Salva nota</button>
        </form>
        <div id="diaryList" class="diary-list"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <span class="nav-indicator" aria-hidden="true"></span>
    <button class="nav-btn" data-tab="tab-edit">Modifica</button>
    <button class="nav-btn nav-main active" data-tab="tab-week">Settimana</button>
    <button class="nav-btn" data-tab="tab-personal">Personale</button>
  </nav>

  <div id="restTimerOverlay" class="rest-timer-overlay hidden">
    <div class="rest-timer-content">
      <p class="rest-timer-label">PAUSA</p>
      <div id="restTimerDisplay" class="rest-timer-display">01:00</div>
      <button id="restTimerSkip" class="rest-timer-skip" type="button">SKIP</button>
    </div>
  </div>

  <!-- Picker drawer -->
  <div id="pickerDrawer" class="picker-drawer hidden">
    <div class="picker-drawer-backdrop"></div>
    <div class="picker-drawer-content">
      <div class="picker-drawer-head">
        <h3>Aggiungi esercizio</h3>
        <button id="closePickerBtn" class="drawer-close" type="button">✕</button>
      </div>
      <input id="editorSearch" type="text" placeholder="Cerca esercizio..." autocomplete="off">
      <div id="libraryPicker" class="library-picker"></div>
    </div>
  </div>

  <!-- Library management modal -->
  <div id="libraryModal" class="library-modal hidden">
    <div class="library-modal-backdrop"></div>
    <div class="library-modal-content">
      <div class="library-modal-head">
        <h3>Libreria Esercizi</h3>
        <button id="closeLibraryMgrBtn" class="drawer-close" type="button">✕</button>
      </div>
      <div class="lib-tabs">
        <button class="lib-tab active" data-source="bench" type="button">Pesi liberi</button>
        <button class="lib-tab" data-source="toorx" type="button">Toorx MSX-50</button>
      </div>
      <ul id="libraryMgrList" class="library-mgr-list"></ul>
      <div class="library-add-form">
        <input id="newExerciseName" type="text" placeholder="Nome nuovo esercizio..." autocomplete="off">
        <button id="addExerciseBtn" class="btn-save" type="button">Aggiungi</button>
      </div>
      <button id="saveLibraryBtn" class="btn-save btn-save-full" type="button">Salva libreria</button>
    </div>
  </div>

  <!-- Exercise info panel -->
  <div id="exerciseInfoPanel" class="exercise-info-panel hidden">
    <div class="exercise-info-backdrop"></div>
    <div class="exercise-info-content">
      <div class="exercise-info-head">
        <h3 id="exerciseInfoTitle"></h3>
        <button id="closeExerciseInfoBtn" class="drawer-close" type="button">✕</button>
      </div>
      <div class="exercise-info-section">
        <label class="exercise-info-label">Peso di riferimento</label>
        <div class="exercise-info-weight-row">
          <input id="exerciseInfoWeight" type="number" min="0" step="0.5" placeholder="0">
          <span class="exercise-info-kg">kg</span>
        </div>
      </div>
      <div class="exercise-info-section">
        <label class="exercise-info-label">Note / Descrizione</label>
        <textarea id="exerciseInfoDesc" rows="3" placeholder="Indicazioni tecniche, note personali..."></textarea>
      </div>
      <div class="exercise-info-section">
        <label class="exercise-info-label">URL video YouTube</label>
        <input id="exerciseInfoVideoUrl" type="url" placeholder="https://youtu.be/...">
      </div>
      <div id="exerciseInfoVideoWrap" class="exercise-info-video-wrap hidden">
        <iframe id="exerciseInfoVideo" frameborder="0" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
      <button id="saveExerciseInfoBtn" class="btn-save btn-save-full" type="button">Salva</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
