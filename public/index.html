<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefoo Gym Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="main-header">
    <h1>Telefoo Planner</h1>
  </header>

  <main class="screen-wrap">
    <section id="tab-edit" class="tab-panel">
      <div class="panel-card">
        <h2>Modifica Scheda Settimanale</h2>
        <div class="editor-controls">
          <select id="editorDaySelect"></select>
          <button id="saveWeekBtn" class="btn-save">Salva settimana</button>
        </div>
        <div class="editor-layout">
          <div class="editor-col">
            <h3>Libreria completa</h3>
            <div id="libraryPicker" class="library-picker"></div>
          </div>
          <div class="editor-col">
            <h3>Esercizi del giorno</h3>
            <ul id="dayExerciseList" class="day-ex-list"></ul>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <h2>Libreria Esercizi</h2>
        <div class="library-grid">
          <article>
            <h3>Panca piana · Manubri · Bilanciere</h3>
            <ul id="freeWeightList"></ul>
          </article>
          <article>
            <h3>Toorx MSX-50</h3>
            <ul id="toorxList"></ul>
          </article>
        </div>
      </div>
    </section>

    <section id="tab-week" class="tab-panel active">
      <div class="week" id="weekContainer"></div>
    </section>

    <section id="tab-personal" class="tab-panel">
      <div class="panel-card">
        <h2>Sezione Personale</h2>
        <p class="profile-name" id="profileName">Paolo Bini</p>
      </div>

      <div class="panel-card">
        <div class="chart-head">
          <h2>Peso e Massa Muscolare</h2>
          <button id="addMetricBtn" class="round-add">+</button>
        </div>

        <form id="metricForm" class="metric-form hidden">
          <input id="metricDate" type="date" required>
          <input id="metricWeight" type="number" step="0.1" min="0" placeholder="Peso (kg)" required>
          <input id="metricMuscle" type="number" step="0.1" min="0" placeholder="Massa muscolare (kg)" required>
          <button class="btn-save" type="submit">Aggiungi dato</button>
        </form>

        <canvas id="metricsChart" width="860" height="280"></canvas>
      </div>

      <div class="panel-card">
        <h2>Diario Allenamenti</h2>
        <form id="diaryForm" class="diary-form">
          <textarea id="diaryInput" rows="4" placeholder="Come sta andando? Sensazioni, carichi, recupero..."></textarea>
          <button type="submit" class="btn-save">Salva nota</button>
        </form>
        <div id="diaryList" class="diary-list"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn" data-tab="tab-edit">Modifica</button>
    <button class="nav-btn nav-main active" data-tab="tab-week">Settimana</button>
    <button class="nav-btn" data-tab="tab-personal">Personale</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
